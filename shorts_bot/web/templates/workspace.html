<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Draft {{ draft_id }} — 3D workspace</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0a0c10; color: #e8e8ec; font-family: Inter, system-ui, sans-serif; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 10px 14px; background: rgba(10,12,16,.92); border-bottom: 1px solid #333;
    }
    #toolbar h1 { font-size: 1rem; margin: 0 12px 0 0; font-weight: 600; }
    #toolbar button {
      padding: 8px 14px; border-radius: 8px; border: 1px solid #444;
      background: #1a1d24; color: inherit; cursor: pointer; font-size: .85rem;
    }
    #toolbar button.primary { background: #8b2635; border-color: #a33; }
    #toolbar button.active { border-color: #6af; background: #1a2840; }
    #status { font-size: .8rem; color: #888; margin-left: auto; }
    #canvas-wrap { position: fixed; inset: 0; top: 52px; }
    canvas { display: block; width: 100%; height: 100%; }
    .hint {
      position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 10;
      font-size: .78rem; color: #888; pointer-events: none;
    }
    a.back { color: #8af; text-decoration: none; font-size: .85rem; }
  </style>
  {% if api_token %}
  <script>window.__API_TOKEN__ = {{ api_token|tojson }};</script>
  {% endif %}
</head>
<body>
  <div id="toolbar">
    <h1>Draft {{ draft_id }} — shared 3D</h1>
    <a class="back" href="/preview/draft/{{ draft_id }}">← Video preview</a>
    <button type="button" id="btn-select-creature" class="active">Move creature</button>
    <button type="button" id="btn-select-camera">Move camera</button>
    <button type="button" id="btn-reset">Reset</button>
    <button type="button" id="btn-save" class="primary">Save layout</button>
    <span id="status">Connecting…</span>
  </div>
  <div id="canvas-wrap"></div>
  <p class="hint">
    Drag the creature (or camera). Everyone on this page sees moves live.
    Save → cloud render uses your positions. Orbit: right-drag · Pan: middle · Zoom: scroll
  </p>
  <script type="module">
    import { initWorkspace } from '/static/workspace3d.js';
    initWorkspace({ draftId: {{ draft_id }}, creatureUrl: {{ creature_url|tojson }} });
  </script>
</body>
</html>
