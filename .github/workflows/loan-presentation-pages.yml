name: Deploy loan presentation (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/presentations/**"
      - ".github/workflows/loan-presentation-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: loan-presentation-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/presentations

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
