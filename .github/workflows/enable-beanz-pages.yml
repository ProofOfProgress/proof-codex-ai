name: Enable and deploy Beanz Treats Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

jobs:
  enable-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages (workflow source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST "/repos/${{ github.repository }}/pages" -f build_type=workflow || \
          gh api --method PUT "/repos/${{ github.repository }}/pages" -f build_type=workflow

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: beanz-treats

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
